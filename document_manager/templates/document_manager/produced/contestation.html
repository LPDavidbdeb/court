{% extends 'base.html' %}

{% block title %}{{ document.title }}{% endblock %}

{% block extra_head %}
<style>
    .section-title {
        font-size: 1.1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #343a40;
    }
    .verbatim-allegation {
        font-style: italic;
        color: #495057;
        font-size: 0.95rem;
    }
    .allegation-group .card-header {
        font-size: 0.85rem;
    }
    .fact-item p {
        font-size: 0.92rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <h1 class="h4 mb-1">{{ document.title }}</h1>
            <a href="{% url 'document_manager:produced_editor' document.pk %}" class="btn btn-sm btn-outline-secondary">
                Éditer
            </a>
        </div>
    </div>

    {% include "document_manager/produced/_contestation_tree.html" with nodes=root_nodes %}
</div>
{% endblock %}
